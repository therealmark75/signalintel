<style>
/* ── Shared Navigation ────────────────────────────────────────────────
   Self-contained: the nav defines its own design tokens scoped to .nav so
   it renders identically on pages that do NOT carry the dashboard token set.
   Do not rely on the including page for these values. */
.nav{
    /* local token values, scoped to the nav subtree (no global leak) */
    --ink-50:#f6f7f9; --ink-100:#e8ebf0; --ink-300:#aab3c2; --ink-400:#8a93a6; --ink-500:#5a6478;
    --green-400:#3ec762;
    --line:rgba(255,255,255,0.06);
    --gold-500:#c9a04a; --gold-400:#d4b06a; --gold-glow:rgba(201,160,74,0.16);
    --font-mono:'JetBrains Mono', ui-monospace, monospace;
    position: sticky; top: 0; z-index: 50;
    background: rgba(8,17,31,0.82);
    backdrop-filter: blur(12px) saturate(140%);
    -webkit-backdrop-filter: blur(12px) saturate(140%);
    border-bottom: 1px solid var(--line);
}
.nav-inner { max-width: 1480px; margin: 0 auto; padding: 14px 28px; display: flex; align-items: center; justify-content: space-between; gap: 20px; }
.nav-logo { display: flex; align-items: center; gap: 11px; text-decoration: none; flex-shrink: 0; }
.nav-mark { width: 28px; height: 28px; }
.nav-wordmark { font-size: 19px; font-weight: 600; letter-spacing: -0.015em; color: var(--ink-50); }
.nav-wordmark .intel { color: var(--green-400); font-weight: 700; }
.nav-links { display: flex; align-items: center; gap: 26px; }
.nav-links a { color: var(--ink-300); font-size: 13.5px; font-weight: 500; letter-spacing: 0.01em; transition: color .18s; position: relative; padding: 4px 0; text-decoration: none; white-space: nowrap; }
.nav-links a:hover { color: var(--green-400); }
.nav-links a.active { color: var(--ink-50); }
.nav-links a.active::after { content: ''; position: absolute; bottom: -15px; left: 0; right: 0; height: 2px; background: var(--green-400); }
.nav-right { display: flex; align-items: center; gap: 18px; flex-shrink: 0; }
.tier-pill {
    font-family: var(--font-mono); font-size: 10px; font-weight: 500;
    letter-spacing: 0.08em; text-transform: uppercase;
    padding: 4px 10px; border-radius: 5px;
    border: 1px solid var(--gold-500); color: var(--gold-400);
    background: var(--gold-glow);
}
.tier-pill.tp-free, .tier-pill.tp-starter, .tier-pill.tp-pro {
    border-color: var(--ink-500); color: var(--ink-300); background: transparent;
}
.nav-signout { color: var(--ink-400); font-size: 13px; text-decoration: none; }
.nav-signout:hover { color: var(--ink-100); }
</style>
<nav class="nav">
    <div class="nav-inner">
        <a class="nav-logo" href="/dashboard">
            <svg class="nav-mark" viewBox="0 0 32 32" fill="none">
                <path d="M16 3 L27 9.5 V22.5 L16 29 L5 22.5 V9.5 Z" stroke="#3ec762" stroke-width="1.6" fill="rgba(62,199,98,0.05)"/>
                <path d="M11 13 L16 21 L21 11" stroke="#3ec762" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <span class="nav-wordmark">Signal<span class="intel">Intel</span></span>
        </a>
        {% include '_search.html' %}
        <div class="nav-links">
            <a href="/dashboard" class="{{ 'active' if request.path == '/dashboard' else '' }}">Dashboard</a>
            <a href="/signals" class="{{ 'active' if request.path == '/signals' else '' }}">Signals</a>
            <a href="/screener" class="{{ 'active' if request.path == '/screener' else '' }}">Screener</a>
            <a href="/markets" class="{{ 'active' if request.path == '/markets' else '' }}">Markets</a>
            <a href="/watchlist" class="{{ 'active' if request.path == '/watchlist' else '' }}">Watchlist</a>
            <a href="/penny" class="{{ 'active' if request.path == '/penny' else '' }}">Penny</a>
        </div>
        <div class="nav-right">
            {% if user %}
            <span class="tier-pill tp-{{ nav_tier }}">{{ (nav_tier or 'free')|capitalize }}</span>
            <a href="/logout" class="nav-signout">Sign out</a>
            {% endif %}
        </div>
    </div>
</nav>
<style>
/* Toast: must live outside the nav to avoid backdrop-filter fixed-positioning bug */
#wl-toast{position:fixed;bottom:24px;right:24px;z-index:99999;
    background:#0a1628;border:1px solid rgba(0,255,136,0.35);border-radius:8px;
    padding:12px 18px;font-family:var(--mono,monospace);font-size:12px;
    color:#e2eaf4;box-shadow:0 8px 32px rgba(0,0,0,0.5);
    display:none;align-items:center;gap:10px;max-width:340px;cursor:pointer;
    transition:opacity 0.3s;}
#wl-toast .toast-icon{color:#00ff88;font-size:14px;flex-shrink:0;}
#wl-toast .toast-msg{flex:1;line-height:1.4;}
#wl-toast .toast-link{color:#00d4ff;text-decoration:none;white-space:nowrap;}
</style>
<div id="wl-toast" onclick="this.style.display='none'">
    <span class="toast-icon">✓</span>
    <span class="toast-msg" id="wl-toast-msg"></span>
</div>
